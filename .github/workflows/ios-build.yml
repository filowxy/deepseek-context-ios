name: iOS Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Environment probe
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun simctl list devices available

      - name: Build
        working-directory: ./DeepSeekContext
        run: |
          xcodebuild build \
            -scheme DeepSeekContext \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Test
        working-directory: ./DeepSeekContext
        run: |
          xcodebuild test \
            -scheme DeepSeekContext \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
