name: iOS Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Environment probe
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun simctl list devices available

      - name: Build
        working-directory: ./DeepSeekContext
        run: |
          xcodebuild build \
            -scheme DeepSeekContext \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: DeepSeekContext/build.log

      - name: Test
        working-directory: ./DeepSeekContext
        run: |
          xcodebuild test \
            -scheme DeepSeekContext \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | tee test.log

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: DeepSeekContext/test.log
